name: Build & Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: linux
            runner: ubuntu-latest
            name: termchat-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: linux
            runner: ubuntu-latest
            name: termchat-aarch64-linux
          # macOS
          - target: x86_64-apple-darwin
            os: macos
            runner: macos-13
            name: termchat-x86_64-macos
          - target: aarch64-apple-darwin
            os: macos
            runner: macos-latest
            name: termchat-aarch64-macos
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows
            runner: windows-latest
            name: termchat-x86_64-windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "-C strip=symbols"

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/termchat ${{ matrix.name }}
          chmod +x ${{ matrix.name }}
          tar czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}

      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/termchat.exe ${{ matrix.name }}.exe

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}${{ matrix.os == 'windows' && '.exe' || '' }}
            ${{ matrix.name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checksums:
    name: Generate checksums
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all release assets
        run: gh release download "${{ github.ref_name }}" --dir .releases --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksums
        if: hashFiles('.releases/*') != ''
        working-directory: .releases
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: .releases/SHA256SUMS.txt
          fail-on-unmatched-files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
