name: Build & Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu
        env:
          RUSTFLAGS: "-C strip=symbols"

      - name: Create tar.gz
        shell: bash
        run: |
          cp target/x86_64-unknown-linux-gnu/release/tch tch-x86_64-linux
          chmod +x tch-x86_64-linux
          tar czf tch-x86_64-linux.tar.gz tch-x86_64-linux

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-deb
        run: cargo binstall cargo-deb --no-confirm

      - name: Build .deb package
        run: cargo deb --target x86_64-unknown-linux-gnu --no-build

      - name: Push to Buildkite Package Registries
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.BUILDKITE_API_TOKEN }}" \
            -F "file=@$(ls target/x86_64-unknown-linux-gnu/debian/*.deb)" \
            "https://api.buildkite.com/v2/packages/organizations/lucas-hagfoss/registries/termchat/packages"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tch-x86_64-linux.tar.gz
            target/x86_64-unknown-linux-gnu/debian/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: macOS
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - target: x86_64-apple-darwin
          #   runner: macos-13
          #   name: tch-x86_64-macos
          - target: aarch64-apple-darwin
            runner: macos-latest
            name: tch-aarch64-macos

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "-C strip=symbols"

      - name: Package
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/tch ${{ matrix.name }}
          chmod +x ${{ matrix.name }}
          tar czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc
        env:
          RUSTFLAGS: "-C strip=symbols"

      - name: Rename binary
        run: copy target\x86_64-pc-windows-msvc\release\tch.exe tch-x86_64-windows.exe

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: tch-x86_64-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checksums:
    name: Generate checksums
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all release assets
        run: gh release download "${{ github.ref_name }}" --dir .releases --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksums
        if: hashFiles('.releases/*') != ''
        working-directory: .releases
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: .releases/SHA256SUMS.txt
          fail-on-unmatched-files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
