name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g. v0.1.0)
  workflow_dispatch: # Allow manual triggers from the GitHub Actions tab

permissions:
  contents: write # Required to create/upload releases

jobs:
  build:
    name: Build - ${{ matrix.platform.os_name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            os_name: Linux
            target: x86_64-unknown-linux-gnu
            bin_name: tc
            asset_name: tc-linux
          - os: macos-latest
            os_name: macOS
            target: x86_64-apple-darwin
            bin_name: tc
            asset_name: tc-macos
          - os: windows-latest
            os_name: Windows
            target: x86_64-pc-windows-msvc
            bin_name: tc.exe
            asset_name: tc-windows

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Package binary (Windows)
        if: matrix.platform.os == 'windows-latest'
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar -czf ../../../${{ matrix.platform.asset_name }}.tar.gz ${{ matrix.platform.bin_name }}
        shell: bash

      - name: Package binary (Unix)
        if: matrix.platform.os != 'windows-latest'
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar -czf ../../../${{ matrix.platform.asset_name }}.tar.gz ${{ matrix.platform.bin_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.asset_name }}
          path: ${{ matrix.platform.asset_name }}.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tc-linux/tc-linux.tar.gz
            tc-macos/tc-macos.tar.gz
            tc-windows/tc-windows.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
